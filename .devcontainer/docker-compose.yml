services:
  gcc:
    image: ghcr.io/davidcozens/cpputest:sha-6acaccf
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=debug
    user: developer
    working_dir: /workspaces/SolidSyslog
    command: sleep infinity
    depends_on:
      - syslog-ng

  syslog-ng:
    image: balabit/syslog-ng:latest
    volumes:
      - ../Bdd/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ../Bdd/output:/var/log/syslog-ng
      - syslog-ng-ctl:/var/lib/syslog-ng
    ports:
      - "5514:5514/udp"
      - "6514:6514/tcp"
    working_dir: /workspaces/SolidSyslog

  behave:
    image: ghcr.io/davidcozens/behave:sha-b871b1c
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ../Bdd/output:/workspaces/SolidSyslog/Bdd/output
      - syslog-ng-ctl:/var/lib/syslog-ng
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    user: developer
    working_dir: /workspaces/SolidSyslog
    depends_on:
      - syslog-ng
    command: sleep infinity

  clang:
    image: ghcr.io/davidcozens/cpputest-clang:sha-6ea3f95
    volumes:
      - ..:/workspaces/SolidSyslog:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=clang-debug
    user: developer
    working_dir: /workspaces/SolidSyslog
    command: sleep infinity

volumes:
  syslog-ng-ctl:
