services:
  gcc:
    image: ghcr.io/davidcozens/cpputest:sha-6acaccf
    volumes:
      - ..:/workspaces/CppUTestTemplate:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=debug
    user: developer
    working_dir: /workspaces/CppUTestTemplate
    command: sleep infinity

  behave:
    image: ghcr.io/davidcozens/behave:sha-b871b1c
    volumes:
      - ..:/workspaces/CppUTestTemplate:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    user: developer
    working_dir: /workspaces/CppUTestTemplate
    command: sleep infinity

  clang:
    image: ghcr.io/davidcozens/cpputest-clang:sha-6ea3f95
    volumes:
      - ..:/workspaces/CppUTestTemplate:cached
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ${HOME}/.claude:/home/developer/.claude
      - ${HOME}/.config/gh:/home/developer/.config/gh
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - BUILD_PRESET=clang-debug
    user: developer
    working_dir: /workspaces/CppUTestTemplate
    command: sleep infinity
