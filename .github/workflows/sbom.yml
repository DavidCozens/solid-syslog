name: Generate SBOM

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  sbom:
    # Generation + validation — shared by both triggers. Read-only; no secrets.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from release-please manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute source-tarball hash
        id: hash
        run: |
          # Product scope per docs/security/sbom.md: Core/ + Platform/.
          # Example/, Tests/, Bdd/, ci/, docs/, .devcontainer/, .github/
          # are reference / test-harness / infrastructure and out of scope.
          TARBALL=$(mktemp)
          git archive --format=tar.gz HEAD -- Core/ Platform/ > "$TARBALL"
          HASH=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          rm "$TARBALL"

      - name: Generate serial number
        id: serial
        run: |
          echo "uuid=$(cat /proc/sys/kernel/random/uuid)" >> "$GITHUB_OUTPUT"

      - name: Render SBOM
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
          SOURCE_HASH: ${{ steps.hash.outputs.hash }}
          SERIAL_NUMBER: ${{ steps.serial.outputs.uuid }}
          TOOLS_VERSION: ${{ github.workflow_sha }}
        run: |
          export TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          envsubst '${VERSION} ${COMMIT_SHA} ${SOURCE_HASH} ${SERIAL_NUMBER} ${TIMESTAMP} ${TOOLS_VERSION}' \
            < sbom/sbom.cdx.json.template > sbom/sbom.cdx.json
          if grep -q '\${' sbom/sbom.cdx.json; then
            echo "::error::Unresolved placeholders in rendered SBOM"
            grep '\${' sbom/sbom.cdx.json
            exit 1
          fi
          python3 -c "import json; json.load(open('sbom/sbom.cdx.json'))"

      - name: Install cyclonedx-cli (v0.30.0, SHA256-pinned)
        run: |
          curl -sSLo /tmp/cyclonedx https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.30.0/cyclonedx-linux-x64
          echo "f89876326620f5fc78a9b27cc1af57d6ed13d019aab87490e1246a44a910babb  /tmp/cyclonedx" | sha256sum -c -
          chmod +x /tmp/cyclonedx

      - name: Validate SBOM
        run: |
          /tmp/cyclonedx validate --input-file sbom/sbom.cdx.json --input-format json --input-version v1_5 --fail-on-errors

      - name: Write source-sha256.txt
        run: |
          echo "${{ steps.hash.outputs.hash }}  solid-syslog-${{ steps.version.outputs.version }}.tar.gz" > sbom/source-sha256.txt
          cat sbom/source-sha256.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx-${{ steps.version.outputs.version }}
          path: |
            sbom/sbom.cdx.json
            sbom/source-sha256.txt
          if-no-files-found: error

  publish:
    # Release-only: keyless-sign the SBOM and source hash file, attach both
    # (plus signatures) to the GitHub Release as assets. Advisory-only on
    # initial rollout (per E19 guidance) — continue-on-error is set on the
    # sign + attach steps so a signing failure does not block the release.
    if: github.event_name == 'release'
    needs: sbom
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download SBOM workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sbom-cyclonedx-${{ needs.sbom.outputs.version }}
          path: sbom/

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: 'v3.0.6'
        continue-on-error: true

      - name: Sign SBOM (keyless, GitHub OIDC)
        continue-on-error: true
        run: |
          cosign sign-blob --yes \
            --bundle sbom/sbom.cdx.json.bundle \
            sbom/sbom.cdx.json

      - name: Sign source-sha256.txt (keyless, GitHub OIDC)
        continue-on-error: true
        run: |
          cosign sign-blob --yes \
            --bundle sbom/source-sha256.txt.bundle \
            sbom/source-sha256.txt

      - name: Attach assets to Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --repo is required here: the publish job doesn't check out the
          # source, so `gh` has no git config to infer the repo from.
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom/sbom.cdx.json \
            sbom/sbom.cdx.json.bundle \
            sbom/source-sha256.txt \
            sbom/source-sha256.txt.bundle \
            --clobber \
            --repo "${{ github.repository }}"
