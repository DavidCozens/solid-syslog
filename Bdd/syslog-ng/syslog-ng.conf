@version: 4.11

source s_udp {
    syslog(
        transport("udp")
        port(5514)
        keep-hostname(yes)
    );
};

source s_tcp {
    syslog(
        transport("tcp")
        port(5514)
        keep-hostname(yes)
    );
};

source s_tls {
    syslog(
        transport("tls")
        port(6514)
        keep-hostname(yes)
        tls(
            key-file("/etc/syslog-ng/tls/server.key")
            cert-file("/etc/syslog-ng/tls/server.pem")
            ca-file("/etc/syslog-ng/tls/ca.pem")
            peer-verify(optional-untrusted)
        )
    );
};

destination d_file {
    file(
        "/var/log/syslog-ng/received.log"
        template("PRIORITY=${PRI} TIMESTAMP=${ISODATE} HOSTNAME=${HOST} APP_NAME=${PROGRAM} PROCID=${PID} MSGID=${MSGID} STRUCTURED_DATA=${SDATA} MSG=${MSG}\n")
        flush_lines(1)
        create-dirs(yes)
        perm(0644)
    );
};

destination d_file_udp {
    file(
        "/var/log/syslog-ng/received_udp.log"
        template("PRIORITY=${PRI} TIMESTAMP=${ISODATE} HOSTNAME=${HOST} APP_NAME=${PROGRAM} PROCID=${PID} MSGID=${MSGID} STRUCTURED_DATA=${SDATA} MSG=${MSG}\n")
        flush_lines(1)
        create-dirs(yes)
        perm(0644)
    );
};

destination d_file_tcp {
    file(
        "/var/log/syslog-ng/received_tcp.log"
        template("PRIORITY=${PRI} TIMESTAMP=${ISODATE} HOSTNAME=${HOST} APP_NAME=${PROGRAM} PROCID=${PID} MSGID=${MSGID} STRUCTURED_DATA=${SDATA} MSG=${MSG}\n")
        flush_lines(1)
        create-dirs(yes)
        perm(0644)
    );
};

destination d_file_tls {
    file(
        "/var/log/syslog-ng/received_tls.log"
        template("PRIORITY=${PRI} TIMESTAMP=${ISODATE} HOSTNAME=${HOST} APP_NAME=${PROGRAM} PROCID=${PID} MSGID=${MSGID} STRUCTURED_DATA=${SDATA} MSG=${MSG}\n")
        flush_lines(1)
        create-dirs(yes)
        perm(0644)
    );
};

log {
    source(s_udp);
    source(s_tcp);
    source(s_tls);
    destination(d_file);
};

log {
    source(s_udp);
    destination(d_file_udp);
};

log {
    source(s_tcp);
    destination(d_file_tcp);
};

log {
    source(s_tls);
    destination(d_file_tls);
};
