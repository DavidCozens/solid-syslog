<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 1215" font-family="'Segoe UI', sans-serif">
  <desc>SolidSyslog architecture: Core at the centre owns twelve interface roles (inner ring). Eight radiate outward through a SolidSyslog platform adapter to the third-party component it wraps; four are realised by Core itself and stop at the role ring.</desc>
  <style>
    .core     { fill:#ffe7a3; }
    .coreEdge { fill:none; stroke:#3340a8; stroke-width:2.5; opacity:.5; }
    .iface    { fill:#bfe3c0; stroke:#8fbf92; stroke-width:1.5; }
    .adapter  { fill:#cdd4f5; stroke:#9aa6e0; stroke-width:1.5; }
    .ext      { fill:#f6c6c6; stroke:#dba3a3; stroke-width:1.5; }
    .t-iface  { font-size:15.5px; font-weight:600; fill:#21401f; }
    .t-ext    { font-size:14px; fill:#4a2c2c; }
    .t-group  { font-size:17px; font-weight:bold; fill:#9a9a90; letter-spacing:2px; }
    .t-core-title { font-size:26px; font-weight:bold; fill:#3a3320; font-family:'Segoe Print','Bradley Hand',cursive; }
    .t-core-sub   { font-size:13px; fill:#6a6250; }
    .t-swatch { font-size:14px; fill:#333; }
    .t-note   { font-size:13px; fill:#8a8a80; font-style:italic; }
    .node     { cursor:pointer; }
    .node:hover .iface { stroke:#6fae74; stroke-width:3; }
    .node:hover .core  { stroke:#b89a3c; stroke-width:3; }
  </style>

  <rect width="1120" height="1215" fill="#fbfbf5"/>

  <!-- ═══ outer rings: only the eight roles a platform actually fills ═══ -->
  <!-- Resolver -->
  <path class="adapter" d="M 722.4 232.0 A 366 366 0 0 0 560.0 194.0 L 560.0 284.0 A 276 276 0 0 1 682.4 312.6 Z"/>
  <path class="ext" d="M 777.4 120.8 A 490 490 0 0 0 560.0 70.0 L 560.0 180.0 A 380 380 0 0 1 728.6 219.4 Z"/>
  <!-- Datagram -->
  <path class="adapter" d="M 858.6 348.3 A 366 366 0 0 0 733.7 237.8 L 691.0 317.1 A 276 276 0 0 1 785.2 400.4 Z"/>
  <path class="ext" d="M 959.7 276.6 A 490 490 0 0 0 792.6 128.7 L 740.3 225.5 A 380 380 0 0 1 870.0 340.2 Z"/>
  <!-- Stream -->
  <path class="adapter" d="M 923.3 515.4 A 366 366 0 0 0 865.8 358.9 L 790.6 408.3 A 276 276 0 0 1 833.9 526.4 Z"/>
  <path class="ext" d="M 1046.3 500.3 A 490 490 0 0 0 969.4 290.7 L 877.5 351.2 A 380 380 0 0 1 937.2 513.7 Z"/>
  <!-- File -->
  <path class="adapter" d="M 771.7 858.6 A 366 366 0 0 0 882.2 733.7 L 802.9 691.0 A 276 276 0 0 1 719.6 785.2 Z"/>
  <path class="ext" d="M 843.4 959.7 A 490 490 0 0 0 991.3 792.6 L 894.5 740.3 A 380 380 0 0 1 779.8 870.0 Z"/>
  <!-- Buffer -->
  <path class="adapter" d="M 426.9 900.9 A 366 366 0 0 0 591.9 924.6 L 584.1 834.9 A 276 276 0 0 1 459.6 817.1 Z"/>
  <path class="ext" d="M 381.7 1016.4 A 490 490 0 0 0 602.7 1048.1 L 593.1 938.6 A 380 380 0 0 1 421.8 914.0 Z"/>
  <!-- Mutex -->
  <path class="adapter" d="M 261.4 771.7 A 366 366 0 0 0 386.3 882.2 L 429.0 802.9 A 276 276 0 0 1 334.8 719.6 Z"/>
  <path class="ext" d="M 160.3 843.4 A 490 490 0 0 0 327.4 991.3 L 379.7 894.5 A 380 380 0 0 1 250.0 779.8 Z"/>
  <!-- AtomicCounter -->
  <path class="adapter" d="M 196.7 604.6 A 366 366 0 0 0 254.2 761.1 L 329.4 711.7 A 276 276 0 0 1 286.1 593.6 Z"/>
  <path class="ext" d="M 73.7 619.7 A 490 490 0 0 0 150.6 829.3 L 242.5 768.8 A 380 380 0 0 1 182.8 606.3 Z"/>
  <!-- SecurityPolicy -->
  <path class="adapter" d="M 515.4 196.7 A 366 366 0 0 0 358.9 254.2 L 408.3 329.4 A 276 276 0 0 1 526.4 286.1 Z"/>
  <path class="ext" d="M 500.3 73.7 A 490 490 0 0 0 290.7 150.6 L 351.2 242.5 A 380 380 0 0 1 513.7 182.8 Z"/>

  <!-- ═══ the twelve roles — inner ring, each linked to its contract page ═══ -->
  <a href="../../api/structSolidSyslogResolver/" target="_top" class="node">
    <path class="iface" d="M 676.2 325.2 A 262 262 0 0 0 560.0 298.0 L 560.0 408.0 A 152 152 0 0 1 627.4 423.8 Z"/>
    <text class="t-iface" x="607.2" y="358.4" text-anchor="middle" transform="rotate(-76.8 607.2 358.4)" dominant-baseline="middle">Resolver</text>
  </a>
  <a href="../../api/structSolidSyslogDatagram/" target="_top" class="node">
    <path class="iface" d="M 773.7 408.5 A 262 262 0 0 0 684.3 329.4 L 632.1 426.2 A 152 152 0 0 1 684.0 472.1 Z"/>
    <text class="t-iface" x="697.2" y="405.0" text-anchor="middle" transform="rotate(-48.5 697.2 405.0)" dominant-baseline="middle">Datagram</text>
  </a>
  <a href="../../api/structSolidSyslogStream/" target="_top" class="node">
    <path class="iface" d="M 820.0 528.1 A 262 262 0 0 0 778.9 416.0 L 687.0 476.5 A 152 152 0 0 1 710.9 541.5 Z"/>
    <text class="t-iface" x="754.3" y="488.6" text-anchor="middle" transform="rotate(-20.2 754.3 488.6)" dominant-baseline="middle">Stream</text>
  </a>
  <a href="../../api/structSolidSyslogSender/" target="_top" class="node">
    <path class="iface" d="M 804.0 655.3 A 262 262 0 0 0 821.0 537.2 L 711.4 546.8 A 152 152 0 0 1 701.6 615.3 Z"/>
    <text class="t-iface" x="764.9" y="589.4" text-anchor="middle" transform="rotate(8.2 764.9 589.4)" dominant-baseline="middle">Sender</text>
  </a>
  <a href="../../api/structSolidSyslogStore/" target="_top" class="node">
    <path class="iface" d="M 711.5 773.7 A 262 262 0 0 0 790.6 684.3 L 693.8 632.1 A 152 152 0 0 1 647.9 684.0 Z"/>
    <text class="t-iface" x="715.0" y="697.2" text-anchor="middle" transform="rotate(41.5 715.0 697.2)" dominant-baseline="middle">Store</text>
  </a>
  <a href="../../api/structSolidSyslogFile/" target="_top" class="node">
    <path class="iface" d="M 591.9 820.0 A 262 262 0 0 0 704.0 778.9 L 643.5 687.0 A 152 152 0 0 1 578.5 710.9 Z"/>
    <text class="t-iface" x="631.4" y="754.3" text-anchor="middle" transform="rotate(69.8 631.4 754.3)" dominant-baseline="middle">File</text>
  </a>
  <a href="../../api/structSolidSyslogBlockDevice/" target="_top" class="node">
    <path class="iface" d="M 464.7 804.0 A 262 262 0 0 0 582.8 821.0 L 573.2 711.4 A 152 152 0 0 1 504.7 701.6 Z"/>
    <text class="t-iface" x="530.6" y="764.9" text-anchor="middle" transform="rotate(278.2 530.6 764.9)" dominant-baseline="middle">BlockDevice</text>
  </a>
  <a href="../../api/structSolidSyslogBuffer/" target="_top" class="node">
    <path class="iface" d="M 346.3 711.5 A 262 262 0 0 0 435.7 790.6 L 487.9 693.8 A 152 152 0 0 1 436.0 647.9 Z"/>
    <text class="t-iface" x="422.8" y="715.0" text-anchor="middle" transform="rotate(311.5 422.8 715.0)" dominant-baseline="middle">Buffer</text>
  </a>
  <a href="../../api/structSolidSyslogMutex/" target="_top" class="node">
    <path class="iface" d="M 300.0 591.9 A 262 262 0 0 0 341.1 704.0 L 433.0 643.5 A 152 152 0 0 1 409.1 578.5 Z"/>
    <text class="t-iface" x="365.7" y="631.4" text-anchor="middle" transform="rotate(339.8 365.7 631.4)" dominant-baseline="middle">Mutex</text>
  </a>
  <a href="../../api/structSolidSyslogAtomicCounter/" target="_top" class="node">
    <path class="iface" d="M 316.0 464.7 A 262 262 0 0 0 299.0 582.8 L 408.6 573.2 A 152 152 0 0 1 418.4 504.7 Z"/>
    <text class="t-iface" x="355.1" y="530.6" text-anchor="middle" transform="rotate(368.2 355.1 530.6)" dominant-baseline="middle">AtomicCounter</text>
  </a>
  <a href="../../api/structSolidSyslogStructuredData/" target="_top" class="node">
    <path class="iface" d="M 408.5 346.3 A 262 262 0 0 0 329.4 435.7 L 426.2 487.9 A 152 152 0 0 1 472.1 436.0 Z"/>
    <text class="t-iface" x="405.0" y="422.8" text-anchor="middle" transform="rotate(401.5 405.0 422.8)" dominant-baseline="middle">StructuredData</text>
  </a>
  <a href="../../api/structSolidSyslogSecurityPolicy/" target="_top" class="node">
    <path class="iface" d="M 528.1 300.0 A 262 262 0 0 0 416.0 341.1 L 476.5 433.0 A 152 152 0 0 1 541.5 409.1 Z"/>
    <text class="t-iface" x="488.6" y="365.7" text-anchor="middle" transform="rotate(429.8 488.6 365.7)" dominant-baseline="middle">SecurityPolicy</text>
  </a>

  <!-- ═══ Core ═══ -->
  <circle class="coreEdge" cx="560" cy="560" r="264"/>
  <a href="../../core/" target="_top" class="node">
    <circle class="core" cx="560" cy="560" r="154"/>
    <text class="t-core-title" x="560" y="552" text-anchor="middle">Core</text>
    <text class="t-core-sub" x="560" y="582" text-anchor="middle">owns every interface,</text>
    <text class="t-core-sub" x="560" y="602" text-anchor="middle">and a null for each</text>
  </a>

  <!-- ═══ third-party labels — only where one exists ═══ -->
  <text class="t-ext" x="659.1" y="136.4" text-anchor="middle" transform="rotate(-76.8 659.1 136.4)" dominant-baseline="middle">name resolution</text>
  <text class="t-ext" x="848.2" y="234.2" text-anchor="middle" transform="rotate(-48.5 848.2 234.2)" dominant-baseline="middle">UDP sockets</text>
  <text class="t-ext" x="968.3" y="410.0" text-anchor="middle" transform="rotate(-20.2 968.3 410.0)" dominant-baseline="middle">TCP / TLS</text>
  <text class="t-ext" x="710.0" y="968.3" text-anchor="middle" transform="rotate(69.8 710.0 968.3)" dominant-baseline="middle">filesystem</text>
  <text class="t-ext" x="271.8" y="885.8" text-anchor="middle" transform="rotate(311.5 271.8 885.8)" dominant-baseline="middle">message queue</text>
  <text class="t-ext" x="151.7" y="710.0" text-anchor="middle" transform="rotate(339.8 151.7 710.0)" dominant-baseline="middle">OS mutex</text>
  <text class="t-ext" x="129.4" y="498.2" text-anchor="middle" transform="rotate(368.2 129.4 498.2)" dominant-baseline="middle">atomics</text>
  <text class="t-ext" x="410.0" y="151.7" text-anchor="middle" transform="rotate(429.8 410.0 151.7)" dominant-baseline="middle">crypto library</text>

  <!-- ═══ role groups — porting.md's four ═══ -->
  <text class="t-group" x="987.7" y="267.8" text-anchor="middle" transform="rotate(55.7 987.7 267.8)" dominant-baseline="middle">Networking</text>
  <text class="t-group" x="738.6" y="1046.2" text-anchor="middle" transform="rotate(339.8 738.6 1046.2)" dominant-baseline="middle">Storage</text>
  <text class="t-group" x="73.8" y="738.6" text-anchor="middle" transform="rotate(429.8 73.8 738.6)" dominant-baseline="middle">OS primitives</text>
  <text class="t-group" x="267.8" y="132.3" text-anchor="middle" transform="rotate(325.7 267.8 132.3)" dominant-baseline="middle">Evidence</text>

  <!-- ═══ legend ═══ -->
  <g transform="translate(70,1120)">
    <rect x="0" y="0" width="22" height="22" rx="3" fill="#ffe7a3"/>
    <text class="t-swatch" x="30" y="16">Core</text>
    <rect x="110" y="0" width="22" height="22" rx="3" fill="#bfe3c0" stroke="#8fbf92" stroke-width="1.5"/>
    <text class="t-swatch" x="140" y="16">role</text>
    <rect x="215" y="0" width="22" height="22" rx="3" fill="#cdd4f5" stroke="#9aa6e0" stroke-width="1.5"/>
    <text class="t-swatch" x="245" y="16">platform adapter</text>
    <rect x="400" y="0" width="22" height="22" rx="3" fill="#f6c6c6" stroke="#dba3a3" stroke-width="1.5"/>
    <text class="t-swatch" x="430" y="16">third party</text>
  </g>
  <text class="t-note" x="70" y="1180">Sender, Store, BlockDevice and StructuredData need no platform — Core realises them, so they stop at the role ring.</text>
</svg>
